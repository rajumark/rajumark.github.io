<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Tabs UI</title>

  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background-color: #fff;
      color: #333;
      font-family: Comfortaa, Arial, sans-serif;
      font-size: 13px;
      font-weight: 300;
      line-height: 1.4;
      height: 100%;
      position: relative;
      text-rendering: optimizeLegibility;
      z-index: -1;
    }

    .header {
      display: flex;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 0 0 4px;
      height: 56px;
      gap: 32px;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
    }

    .name {
      font-size: 15px;
      font-weight: 500;
      color: #222;
    }

    .nav { display: flex; align-items: center; height: 100%; }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 20px;
      color: #777;
      font-family: Comfortaa, Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-rendering: optimizeLegibility;
      text-decoration: none;
    }

    .nav-item.active {
      color: #1a8a3f;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 1000;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-overlay img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      margin-bottom: 24px;
    }
    .modal-chips {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 8px 18px;
      font-family: Comfortaa, Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #777;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .chip:hover {
      border-color: #1a8a3f;
      color: #1a8a3f;
    }
    .chip .icon { width: 15px; height: 15px; flex-shrink: 0; }

    .content {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
      font-size: 18px;
      font-weight: 300;
      color: #888;
    }
    .page { display: none; }
    .page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }

    .resume-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      border: 2px solid #1a8a3f;
      border-radius: 30px;
      color: #1a8a3f;
      font-family: Comfortaa, Arial, sans-serif;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .resume-btn:hover {
      background: #1a8a3f;
      color: #fff;
    }
    .resume-btn .icon { width: 20px; height: 20px; }
    .resume-sub {
      font-size: 13px;
      font-weight: 300;
      color: #999;
      margin-top: 12px;
    }

    .nav-resume {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: #1a8a3f;
      color: #fff !important;
      border-radius: 20px;
      font-family: Comfortaa, Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .nav-resume:hover { opacity: 0.85; }
    .nav-resume .indicator { display: none; }

    .nav-item .indicator {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      height: 3px;
      background: #1a8a3f;
      border-radius: 2px;
      width: 0;
      pointer-events: none;
    }
  </style>
</head>

  <script>
    function measureText(text) {
      const el = document.createElement('span');
      el.textContent = text;
      el.style.fontSize = '13px';
      el.style.fontWeight = '300';
      el.style.fontFamily = "Comfortaa, Arial, sans-serif";
      el.style.letterSpacing = 'normal';
      el.style.textTransform = 'none';
      el.style.position = 'absolute';
      el.style.visibility = 'hidden';
      el.style.whiteSpace = 'nowrap';
      document.body.appendChild(el);
      const w = el.offsetWidth;
      document.body.removeChild(el);
      return w;
    }

    function updateIndicator(el) {
      const text = el.childNodes[0].nodeValue.trim();
      const w = measureText(text);
      el.querySelector('.indicator').style.width = w + 'px';
    }

    function resetIndicators() {
      document.querySelectorAll('.nav-item .indicator').forEach(ind => ind.style.width = '0');
    }

    function switchTab(tab) {
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      const page = document.getElementById('page-' + tab.dataset.page);
      if (page) page.classList.add('active');
      resetIndicators();
      updateIndicator(tab);
    }

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', e => {
        if (item.dataset.page) {
          e.preventDefault();
          switchTab(item);
        }
      });
    });

    function openModal() {
      document.getElementById('modal').classList.add('open');
    }
    document.querySelector('.avatar').addEventListener('click', openModal);
    document.querySelector('.name').addEventListener('click', openModal);
    document.getElementById('modal').addEventListener('click', () => {
      document.getElementById('modal').classList.remove('open');
    });

    switchTab(document.querySelector('.nav-item.active'));
  </script>
