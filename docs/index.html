<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background-color: #fff;
      color: #333;
      font-family: Comfortaa, Arial, sans-serif;
      font-size: 13px;
      font-weight: 300;
      line-height: 1.4;
      height: 100%;
      position: relative;
      text-rendering: optimizeLegibility;
      z-index: -1;
    }

    .header {
      display: flex;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 0 0 4px;
      height: 56px;
      gap: 32px;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }

    .name {
      font-size: 15px;
      font-weight: 500;
      color: #222;
    }

    .nav { display: flex; align-items: center; height: 100%; }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 20px;
      cursor: pointer;
      user-select: none;
      color: #777;
      font-family: Comfortaa, Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-rendering: optimizeLegibility;
    }

    .nav-item.active {
      color: #1a8a3f;
    }

    .nav-item .indicator {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      height: 3px;
      background: #1a8a3f;
      border-radius: 2px;
      width: 0;
      transition: width 0.25s;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="profile">
      <img class="avatar" src="raju_profile_small_image.png" alt="Raju Shingadiya">
      <span class="name">Raju Shingadiya</span>
    </div>
    <div class="nav">
      <div class="nav-item active">About<span class="indicator"></span></div>
      <div class="nav-item">Projects<span class="indicator"></span></div>
      <div class="nav-item">Experience<span class="indicator"></span></div>
      <div class="nav-item">Contact me<span class="indicator"></span></div>
    </div>
  </div>

  <script>
    function measureText(text) {
      const el = document.createElement('span');
      el.textContent = text;
      el.style.fontSize = '13px';
      el.style.fontWeight = '300';
      el.style.fontFamily = "Roboto, Arial, sans-serif";
      el.style.letterSpacing = 'normal';
      el.style.textTransform = 'none';
      el.style.position = 'absolute';
      el.style.visibility = 'hidden';
      el.style.whiteSpace = 'nowrap';
      document.body.appendChild(el);
      const w = el.offsetWidth;
      document.body.removeChild(el);
      return w;
    }

    function updateIndicator(el) {
      const text = el.childNodes[0].nodeValue.trim();
      const w = measureText(text);
      el.querySelector('.indicator').style.width = w + 'px';
    }

    function resetIndicators() {
      document.querySelectorAll('.nav-item .indicator').forEach(ind => ind.style.width = '0');
    }

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        resetIndicators();
        updateIndicator(item);
      });
      if (item.classList.contains('active')) {
        updateIndicator(item);
      }
    });
  </script>
</body>
</html>
