<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects - Raju Shingadiya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background-color: #fff;
      color: #333;
      font-family: Comfortaa, Arial, sans-serif;
      font-size: 13px;
      font-weight: 300;
      line-height: 1.4;
      height: 100%;
      position: relative;
      text-rendering: optimizeLegibility;
      z-index: -1;
    }

    .header {
      display: flex;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 0 0 4px;
      height: 56px;
      gap: 32px;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
    }

    .name {
      font-size: 15px;
      font-weight: 500;
      color: #222;
    }

    .nav { display: flex; align-items: center; height: 100%; }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 20px;
      color: #777;
      font-family: Comfortaa, Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-rendering: optimizeLegibility;
      text-decoration: none;
    }

    .nav-item.active {
      color: #1a8a3f;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 1000;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-overlay img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      margin-bottom: 24px;
    }
    .modal-chips {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 8px 18px;
      font-family: Comfortaa, Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #777;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .chip:hover {
      border-color: #1a8a3f;
      color: #1a8a3f;
    }
    .chip .icon { width: 15px; height: 15px; flex-shrink: 0; }

    .content {
      padding: 20px 48px;
      min-height: calc(100vh - 56px);
    }
    .filter-chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filter-chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 20px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-family: Comfortaa, Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #777;
      background: #fff;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s, color 0.15s;
      text-decoration: none;
    }
    .filter-chip.active {
      border-color: #1a8a3f;
      color: #1a8a3f;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 24px;
      margin-top: 24px;
    }
    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
    }
    .app-icon {
      width: 140px;
      height: 140px;
      border-radius: 28px;
      object-fit: cover;
    }
    .app-title {
      margin-top: 12px;
      font-size: 15px;
      font-weight: 500;
      color: #444;
      line-height: 1.3;
    }

    .aosp-hero {
      margin-bottom: 32px;
    }
    .aosp-hero-title {
      font-size: 18px;
      font-weight: 500;
      color: #222;
    }
    .aosp-hero-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #1a8a3f;
      font-family: Comfortaa, Arial, sans-serif;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-left: 12px;
    }
    .aosp-hero-link:hover { opacity: 0.7; }
    .aosp-hero-link .icon { width: 16px; height: 16px; }

    .aosp-images {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      align-items: flex-start;
    }
    .aosp-images img {
      height: 600px;
      width: auto;
      border-radius: 12px;
    }

    .aosp-section-title {
      font-size: 18px;
      font-weight: 500;
      color: #222;
      margin: 40px 0 20px;
      padding-bottom: 8px;
      border-bottom: 2px solid #1a8a3f;
    }
    .aosp-section-title .icon {
      width: 20px;
      height: 20px;
      vertical-align: middle;
      margin-right: 8px;
    }
    .aosp-desc {
      font-size: 13px;
      color: #444;
      margin-bottom: 24px;
    }
    .aosp-list {
      list-style: none;
      padding: 0;
    }
    .aosp-list li {
      position: relative;
      padding: 10px 0 10px 28px;
      font-size: 13px;
      color: #444;
      border-bottom: 1px solid #f0f0f0;
    }
    .aosp-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 14px;
      width: 8px;
      height: 8px;
      border: 2px solid #1a8a3f;
      border-radius: 50%;
    }
    .aosp-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .aosp-tech span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: #555;
    }
    .aosp-tech span .icon { width: 14px; height: 14px; }

    .nav-item .indicator {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      height: 3px;
      background: #1a8a3f;
      border-radius: 2px;
      width: 0;
      transition: width 0.25s;
      pointer-events: none;
    }
  </style>
</head>

  <script>
    function measureText(text) {
      const el = document.createElement('span');
      el.textContent = text;
      el.style.fontSize = '13px';
      el.style.fontWeight = '300';
      el.style.fontFamily = "Comfortaa, Arial, sans-serif";
      el.style.letterSpacing = 'normal';
      el.style.textTransform = 'none';
      el.style.position = 'absolute';
      el.style.visibility = 'hidden';
      el.style.whiteSpace = 'nowrap';
      document.body.appendChild(el);
      const w = el.offsetWidth;
      document.body.removeChild(el);
      return w;
    }

    function updateIndicator(el) {
      const text = el.childNodes[0].nodeValue.trim();
      const w = measureText(text);
      el.querySelector('.indicator').style.width = w + 'px';
    }

    function openModal() {
      document.getElementById('modal').classList.add('open');
    }
    document.querySelector('.avatar').addEventListener('click', openModal);
    document.querySelector('.name').addEventListener('click', openModal);
    document.getElementById('modal').addEventListener('click', () => {
      document.getElementById('modal').classList.remove('open');
    });

    document.querySelector('.nav-item.active') && updateIndicator(document.querySelector('.nav-item.active'));

    const projectsData = {
      mobile: [
        { icon: "images/apps_logo_screenshots/tileswale_apps_logo.webp", title: "Tileswale", link: "https://play.google.com/store/apps/details?id=com.lightlink.tileswaleApp" },
        { icon: "images/apps_logo_screenshots/deshparivahan.webp", title: "Desh Parivahan", link: "https://play.google.com/store/apps/details?id=com.deshparivahan.deshparivahan" },
        { icon: "images/apps_logo_screenshots/zobaze.webp", title: "Zobaze", link: "https://play.google.com/store/apps/dev?id=6773541816598877702&hl=en_IN" },
        { icon: "images/apps_logo_screenshots/mybalance.webp", title: "My Balance Center - for CREDIT", link: "https://play.google.com/store/apps/details?id=com.esjayit.mybalancecenter&hl=en" },
        { icon: "images/apps_logo_screenshots/mycomplaintbox.webp", title: "My Complaint Box", link: "https://play.google.com/store/apps/details?id=com.esjay.complainbox&hl=en" },
        { icon: "images/apps_logo_screenshots/agentcollectioncenter.webp", title: "Agent Collection Center - Dail", link: "https://play.google.com/store/apps/details?id=com.esjay.agentcollectioncenter&hl=en" },
        { icon: "images/apps_logo_screenshots/patriaclub.webp", title: "Patria Club", link: "https://play.google.com/store/apps/details?id=com.esjayit.patriaclub&hl=en" },
        { icon: "images/apps_logo_screenshots/advancedentry.jpg", title: "Advanced Entry", link: "https://advancedentry.com/" }
      ],
      desktop: [
        { icon: "images/apps_logo_screenshots/porpita.png", title: "Porpita", link: "https://rajumark.github.io/porpita/" }
      ],
      ai: [
        { icon: "images/apps_logo_screenshots/localchat.svg", title: "Local Chat", link: "https://github.com/rajumark/localchat" },
        { icon: "images/apps_logo_screenshots/localphotos.svg", title: "Local Photos", link: "https://github.com/rajumark/localphotos" },
        { icon: "images/apps_logo_screenshots/localtranslate.svg", title: "Local Translate", link: "https://github.com/rajumark/localtranslate" },
        { icon: "images/apps_logo_screenshots/localdocument.svg", title: "Local Documents", link: "https://github.com/rajumark/localdocuments" }
      ],
    };

    const aospHTML = `
      <div class="aosp-hero">
        <span class="aosp-hero-title">Keyphone Firmware and Apps
          <a class="aosp-hero-link" href="https://keyphone.tech/explore-the-keyphone/" target="_blank" rel="noopener noreferrer">
            Keyphone
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </a>
        </span>
      </div>

      <div class="aosp-images">
        <img src="images/apps_logo_screenshots/keyphone_apps.png" alt="Keyphone apps" loading="lazy">
        <img src="images/apps_logo_screenshots/keyphonedevice.png" alt="Keyphone device" loading="lazy">
      </div>

      <h2 class="aosp-section-title">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#1a8a3f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Custom AOSP Firmware Development & System Integration
      </h2>

      <p class="aosp-desc">Engineered and customized full-stack AOSP (Android Open Source Project) Firmware across major releases spanning Android 11 to the latest Android 15 platforms. This involved modifying core system behaviors, optimizing OS performance, and delivering highly tailored, proprietary user experiences for specialized hardware.</p>

      <h3 style="font-size:15px;font-weight:500;color:#222;margin-bottom:12px;">Key Technical Contributions</h3>

      <ul class="aosp-list">
        <li><strong>OS-Level Customization:</strong> Modified AOSP system source code, HAL (Hardware Abstraction Layer), and system services to meet custom hardware specifications and client-specific security protocols.</li>
        <li><strong>Firmware Evolution:</strong> Successfully managed platform migrations and feature porting from legacy frameworks (Android 11) up to modern runtime environments (Android 15).</li>
        <li><strong>System App Ecosystem:</strong> Designed and engineered a unified suite of core system applications (as shown in keyphone_apps.png), including Phone, Messaging, Contacts, Gallery, and specialized Settings.</li>
        <li><strong>UX/UI Overhaul:</strong> Stripped away stock Android bloatware to implement a high-performance, minimalist, custom launcher and a synchronized icon ecosystem built for frictionless navigation.</li>
        <li><strong>System Stability & Hardening:</strong> Refactored background services, optimized resource management, and handled system-level permissions to maximize battery life and device security.</li>
      </ul>

      <h2 class="aosp-section-title">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#1a8a3f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        Tech Stack
      </h2>

      <div class="aosp-tech">
        <span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> AOSP (Android 11 / 15)</span>
        <span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="16 3 21 8 8 21 3 21 3 16 16 3"/></svg> C++</span>
        <span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> Java</span>
        <span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg> Kotlin</span>
        <span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Android NDK/SDK</span>
        <span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> Git</span>
        <span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> ADB</span>
        <span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg> SystemUI Customization</span>
      </div>
    `;

    function renderApps(category) {
      const grid = document.getElementById('appGrid');
      const apps = projectsData[category];
      if (category === 'aosp') {
        grid.style.display = 'block';
        grid.innerHTML = aospHTML;
        return;
      }
      grid.style.display = '';
      if (!apps) { grid.innerHTML = ''; return; }
      grid.innerHTML = apps.map(app => `
        <a class="app-item" href="${app.link}" target="_blank" rel="noopener noreferrer">
          <img class="app-icon" src="${app.icon}" alt="${app.title}" loading="lazy">
          <span class="app-title">${app.title}</span>
        </a>
      `).join('');
    }

    renderApps('mobile');

    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', e => {
        if (!chip.dataset.category) return;
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        renderApps(chip.dataset.category);
      });
    });
  </script>
